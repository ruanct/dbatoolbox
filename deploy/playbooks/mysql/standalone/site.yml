---
- hosts: targets
  become: true
  gather_facts: true
  vars:
    d: "{{ deploy }}"
    mysql_basedir: "{{ d.install.basedir | default('/usr/local/mysql') }}"
    mysql_port: "{{ d.cmdb.port | default(3306) }}"
    mysql_instance_root: "{{ d.install.instance_root | default('/data/mysql' ~ mysql_port) }}"
    mysql_datadir: "{{ d.install.datadir | default(mysql_instance_root ~ '/data') }}"
    mysql_socket: "{{ d.install.socket | default(mysql_instance_root ~ '/mysql.sock') }}"
    mysql_cnf_path: "{{ d.install.cnf_path | default(mysql_instance_root ~ '/my.cnf') }}"
    mysql_log_error: "{{ d.install.log_error | default(mysql_instance_root ~ '/mysql_err.log') }}"
    mysql_service_name: "{{ d.install.service_name | default('mysqld' ~ mysql_port) }}"
    mysql_binlog_dir: "{{ d.install.binlog_dir | default(mysql_instance_root ~ '/binlog') }}"
    mysql_log_bin: "{{ d.install.log_bin | default(mysql_binlog_dir ~ '/mysql-bin') }}"
    mysql_server_id: "{{ d.config.server_id }}"
    mysql_enable_binlog: "{{ d.config.enable_binlog | default(true) | bool }}"
    mysql_enable_gtid: "{{ d.config.enable_gtid | default(true) | bool }}"
    mysql_download_url: "{{ d.media.download_url }}"
    mysql_package_ref: "{{ d.media.package_ref }}"
    mysql_package_dir: "{{ mysql_basedir | dirname }}/{{ d.media.package_ref }}"
    mysql_package_glibc: "{{ d.media.package_glibc_version | default('') }}"
    mysql_dba_global_privileges: "{{ d.credentials.dba_global_privileges | default('SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, RELOAD, PROCESS, REFERENCES, INDEX, ALTER, SHOW DATABASES, CREATE TEMPORARY TABLES, LOCK TABLES, EXECUTE, REPLICATION SLAVE, REPLICATION CLIENT, CREATE VIEW, SHOW VIEW, CREATE ROUTINE, ALTER ROUTINE, CREATE USER, EVENT, TRIGGER') }}"
    mysql_root_password_sql: "{{ d.credentials.root_password | replace(\"'\", \"''\") }}"
    mysql_admin_name: "{{ (d.credentials.admin_account | default({})).account_name | default('admin') }}"
    mysql_admin_host: "{{ (d.credentials.admin_account | default({})).grant_host | default('%') }}"
    mysql_admin_pswd_sql: "{{ ((d.credentials.admin_account | default({})).account_pswd | default('')) | replace(\"'\", \"''\") }}"
    mysql_root_client_cnf_path: "{{ mysql_instance_root }}/.root-client.cnf"
    mysql_root_sql_path: "/tmp/dbatoolbox_mysql_root_{{ d.cmdb.port | default(3306) }}.sql"
    mysql_admin_sql_path: "/tmp/dbatoolbox_mysql_admin_{{ d.cmdb.port | default(3306) }}.sql"
    mysql_legacy_client_cnf_path: "/tmp/dbatoolbox_mysql_client_{{ d.cmdb.port | default(3306) }}.cnf"
    mysql_profile_major: "{{ d.profile.major_version | default('5.7') }}"
    mysql_profile_minor: "{{ d.profile.minor_version | default('') | string }}"
    mysql_profile_full_version: "{{ d.profile.major_version | default('5.7') }}.{{ d.profile.minor_version | default('0') }}"
    mysql_version_grep_pattern: "Ver [0-9]+\\.[0-9]+\\.[0-9]+"
    mysql_force_rebuild: "{{ d.meta.force_rebuild | default(false) | bool }}"
    mysql_bootstrap_bind_address: "127.0.0.1"
    mysql_bind_address: "{{ d.config.bind_address | default('0.0.0.0') }}"

  tasks:
    - name: "[precheck] 归一化操作系统族"
      tags: [precheck]
      set_fact:
        mysql_os_family: >-
          {%- set dist_id = (ansible_distribution_id | default('') | lower) -%}
          {%- set dist = ansible_distribution | lower -%}
          {%- if dist_id == 'alinux' or dist in ['alibaba cloud linux', 'alibaba', 'alinux', 'aliyun linux', 'aliyun'] -%}
          alinux
          {%- elif dist_id == 'anolis' or dist in ['anolis', 'anolis os', 'anolis linux'] -%}
          anolis
          {%- elif dist_id == 'centos' or dist == 'centos' -%}
          centos
          {%- elif dist_id in ['rhel', 'redhat'] or dist in ['redhat', 'red hat enterprise linux'] -%}
          rhel
          {%- else -%}
          unknown
          {%- endif -%}
        mysql_os_major: "{{ ansible_distribution_major_version | string }}"

    - name: "[precheck] 判断操作系统是否在 Profile 支持范围内"
      tags: [precheck]
      set_fact:
        mysql_os_supported: >-
          {% set ns = namespace(ok=false) -%}
          {% for rule in d.profile.supported_os_rules | default([]) -%}
          {% if rule.family == mysql_os_family
                and mysql_os_major is version(rule.min_major | string, '>=')
                and (rule.max_major is not defined or mysql_os_major is version(rule.max_major | string, '<=')) -%}
          {% set ns.ok = true -%}
          {% endif -%}
          {% endfor -%}
          {{ ns.ok | bool }}
      when: d.profile.supported_os_rules | default([]) | length > 0

    - name: "[precheck] 操作系统不在 Profile 支持范围内"
      tags: [precheck]
      fail:
        msg: >-
          目标操作系统不在 Profile 支持范围内：
          distribution={{ ansible_distribution }},
          distribution_id={{ ansible_distribution_id | default('') }},
          major={{ mysql_os_major }},
          family={{ mysql_os_family }}；
          要求 {{ d.profile.supported_os_requirement | default('见 Profile supported_os_rules') }}。
      when:
        - d.profile.supported_os_rules | default([]) | length > 0
        - not (mysql_os_supported | default(false) | bool)

    - name: "[precheck] CPU 架构不支持"
      tags: [precheck]
      fail:
        msg: >-
          不支持 CPU 架构 {{ ansible_architecture }}，
          要求 {{ (d.profile.supported_arch | default(['x86_64'])) | join(', ') }}。
      when: ansible_architecture not in (d.profile.supported_arch | default(['x86_64']))

    - name: "[precheck] 检查 MySQL 程序是否已安装"
      tags: [precheck]
      stat:
        path: "{{ mysql_basedir }}/bin/mysqld"
      register: mysqld_bin

    - name: "[precheck] 检查 Profile 介质目录是否已解压"
      tags: [precheck]
      stat:
        path: "{{ mysql_package_dir }}/bin/mysqld"
      register: precheck_profile_mysqld

    - name: "[precheck] 探测 basedir MySQL 完整版本"
      tags: [precheck]
      shell: >-
        {{ mysql_basedir }}/bin/mysqld --version 2>&1
        | grep -oE '{{ mysql_version_grep_pattern }}'
        | awk '{print $2}'
      register: mysqld_basedir_version_out
      changed_when: false
      when: mysqld_bin.stat.exists | default(false)

    - name: "[precheck] 探测 Profile 介质目录 MySQL 完整版本"
      tags: [precheck]
      shell: >-
        {{ mysql_package_dir }}/bin/mysqld --version 2>&1
        | grep -oE '{{ mysql_version_grep_pattern }}'
        | awk '{print $2}'
      register: precheck_package_version_out
      changed_when: false
      when: precheck_profile_mysqld.stat.exists | default(false)

    - name: "[precheck] 汇总 MySQL 软件版本信息"
      tags: [precheck]
      set_fact:
        mysql_basedir_full_version: "{{ mysqld_basedir_version_out.stdout | default('') | trim }}"
        mysql_package_full_version: "{{ precheck_package_version_out.stdout | default('') | trim }}"

    - name: "[precheck] 无法解析 basedir MySQL 版本"
      tags: [precheck]
      fail:
        msg: >-
          无法解析 {{ mysql_basedir }}/bin/mysqld 完整版本号
          (要求 {{ mysql_profile_full_version }})：
          {{ mysqld_basedir_version_out.stdout | default('') }}
      when:
        - mysqld_bin.stat.exists | default(false)
        - mysql_basedir_full_version | default('') | length == 0

    - name: "[precheck] basedir major 版本与 Profile 不一致"
      tags: [precheck]
      fail:
        msg: >-
          目标主机 {{ mysql_basedir }}/bin/mysqld 版本={{ mysql_basedir_full_version }}，
          major 与待部署 Profile major={{ d.profile.major_version }} 不一致，任务终止。
      when:
        - mysqld_bin.stat.exists | default(false)
        - not mysql_basedir_full_version.startswith(d.profile.major_version ~ '.')

    - name: "[precheck] 无法解析 Profile 介质目录 MySQL 版本"
      tags: [precheck]
      fail:
        msg: >-
          无法解析 {{ mysql_package_dir }}/bin/mysqld 完整版本号
          (要求 {{ mysql_profile_full_version }})：
          {{ precheck_package_version_out.stdout | default('') }}
      when:
        - not mysqld_bin.stat.exists | default(false)
        - precheck_profile_mysqld.stat.exists | default(false)
        - mysql_package_full_version | default('') | length == 0

    - name: "[precheck] Profile 介质目录 major 与档案不一致"
      tags: [precheck]
      fail:
        msg: >-
          目标主机 {{ mysql_package_dir }}/bin/mysqld 版本={{ mysql_package_full_version }}，
          major 与待部署 Profile major={{ d.profile.major_version }} 不一致，任务终止。
      when:
        - not mysqld_bin.stat.exists | default(false)
        - precheck_profile_mysqld.stat.exists | default(false)
        - not mysql_package_full_version.startswith(d.profile.major_version ~ '.')

    - name: "[precheck] 判定软件层场景与是否需要安装"
      tags: [precheck]
      set_fact:
        mysql_software_absent: "{{ not (mysqld_bin.stat.exists | default(false)) }}"
        mysql_software_minor_ge_profile: >-
          {{ mysqld_bin.stat.exists | default(false)
             and (mysql_basedir_full_version is version(mysql_profile_full_version, '>=')) }}
        mysql_software_need_upgrade: >-
          {{ mysqld_bin.stat.exists | default(false)
             and (mysql_basedir_full_version is version(mysql_profile_full_version, '<')) }}
        mysql_need_software_install: >-
          {%- if mysqld_bin.stat.exists | default(false) -%}
          {{ mysql_basedir_full_version is version(mysql_profile_full_version, '<') }}
          {%- else -%}
          true
          {%- endif -%}

    - name: "[precheck] 检查实例数据目录是否已存在"
      tags: [precheck]
      stat:
        path: "{{ mysql_datadir }}/mysql"
      register: mysql_datadir_inited

    - name: "[precheck] 实例数据目录冲突"
      tags: [precheck]
      fail:
        msg: "实例数据目录已存在: {{ mysql_datadir }}"
      when:
        - mysql_datadir_inited.stat.exists | default(false)
        - not (mysql_force_rebuild | bool)

    - name: "[precheck] 探测端口占用与进程归属"
      tags: [precheck]
      shell: |
        set -o pipefail
        PORT="{{ mysql_port }}"
        SERVICE="{{ mysql_service_name }}"
        CNF="{{ mysql_cnf_path }}"
        if ! ss -lntH "sport = :${PORT}" 2>/dev/null | grep -q .; then
          echo "free"
          exit 0
        fi
        if systemctl is-active --quiet "${SERVICE}" 2>/dev/null; then
          echo "platform"
          exit 0
        fi
        if ps -ef 2>/dev/null | grep '[m]ysqld' | grep -Fq "${CNF}"; then
          echo "platform"
          exit 0
        fi
        DETAIL=$(ss -lntpH "sport = :${PORT}" 2>/dev/null | head -n1 | tr -s ' ')
        echo "foreign|${DETAIL}"
      args:
        executable: /bin/bash
      register: mysql_port_probe_raw
      changed_when: false

    - name: "[precheck] 解析端口占用归属"
      tags: [precheck]
      set_fact:
        mysql_port_owner: "{{ (mysql_port_probe_raw.stdout | trim).split('|')[0] }}"
        mysql_port_foreign_detail: >-
          {{ (mysql_port_probe_raw.stdout | trim).split('|')[1] | default('') | trim
             if '|' in (mysql_port_probe_raw.stdout | trim) else '' }}

    - name: "[precheck] 目标端口被占用（软件已满足或首次安装）"
      tags: [precheck]
      fail:
        msg: "目标端口被占用, 部署异常终止"
      when:
        - mysql_port_owner != 'free'
        - (mysql_software_minor_ge_profile | default(false) | bool)
          or (mysql_software_absent | default(false) | bool)
        - not (mysql_force_rebuild | bool and mysql_port_owner == 'platform')

    - name: "[precheck] 低版本软件升级前目标端口有运行实例"
      tags: [precheck]
      fail:
        msg: "有低minor版号的mysql运行实例正在运行,请先手工处理."
      when:
        - mysql_software_need_upgrade | default(false) | bool
        - mysql_port_owner == 'platform'
        - not (mysql_force_rebuild | bool)

    - name: "[precheck] 检查介质 URL 可达（目标机）"
      tags: [precheck]
      uri:
        url: "{{ mysql_download_url }}"
        method: HEAD
        status_code: [200, 301, 302]
      register: media_head
      failed_when: false
      when: mysql_need_software_install | default(true) | bool

    - name: "[precheck] 介质不可达"
      tags: [precheck]
      fail:
        msg: "目标主机无法访问安装包: {{ mysql_download_url }}"
      when:
        - mysql_need_software_install | default(true) | bool
        - media_head.status is not defined or media_head.status not in [200, 301, 302]

    - name: "[precheck] 探测操作系统 glibc 版本"
      tags: [precheck]
      shell: |
        for libc in /lib64/libc.so.6 /lib/x86_64-linux-gnu/libc.so.6; do
          if [ -x "$libc" ]; then
            "$libc" 2>&1 | grep -o '[0-9][0-9]*\.[0-9][0-9]*' | tail -1
            exit 0
          fi
        done
        ldd --version 2>&1 | head -n1 | grep -o '[0-9][0-9]*\.[0-9][0-9]*' | tail -1
      register: os_glibc_raw
      changed_when: false
      when:
        - mysql_need_software_install | default(true) | bool
        - mysql_package_glibc | length > 0

    - name: "[precheck] 解析操作系统 glibc 版本"
      tags: [precheck]
      set_fact:
        mysql_os_glibc: "{{ os_glibc_raw.stdout | trim }}"
      when:
        - mysql_need_software_install | default(true) | bool
        - mysql_package_glibc | length > 0

    - name: "[precheck] 无法解析操作系统 glibc 版本"
      tags: [precheck]
      fail:
        msg: "无法解析目标主机 glibc 版本: {{ os_glibc_raw.stdout | default('') }}"
      when:
        - mysql_need_software_install | default(true) | bool
        - mysql_package_glibc | length > 0
        - mysql_os_glibc | default('') | length == 0

    - name: "[precheck] 软件包 glibc 版本高于操作系统"
      tags: [precheck]
      fail:
        msg: >-
          软件包glibc版本高于OS内glibc版本：软件包要求 glibc>={{ mysql_package_glibc }}，
          操作系统 glibc={{ mysql_os_glibc }}。
      when:
        - mysql_need_software_install | default(true) | bool
        - mysql_package_glibc | length > 0
        - mysql_os_glibc | default('') | length > 0
        - not (mysql_os_glibc is version(mysql_package_glibc, '>='))

    - name: "[prepare] force_rebuild 停止本实例 systemd 服务"
      tags: [prepare]
      systemd:
        name: "{{ mysql_service_name }}"
        state: stopped
        enabled: false
        daemon_reload: true
      failed_when: false
      when: mysql_force_rebuild | bool

    - name: "[prepare] force_rebuild 移除 systemd 单元文件"
      tags: [prepare]
      file:
        path: "/etc/systemd/system/{{ mysql_service_name }}.service"
        state: absent
      when: mysql_force_rebuild | bool

    - name: "[prepare] force_rebuild 清理实例目录"
      tags: [prepare]
      file:
        path: "{{ mysql_instance_root }}"
        state: absent
      when: mysql_force_rebuild | bool

    - name: "[prepare] force_rebuild 清理临时凭据文件"
      tags: [prepare]
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ mysql_legacy_client_cnf_path }}"
        - "{{ mysql_root_sql_path }}"
        - "{{ mysql_admin_sql_path }}"
      when: mysql_force_rebuild | bool

    - name: "[prepare] 检查 Profile 介质目录是否就绪"
      tags: [prepare]
      stat:
        path: "{{ mysql_package_dir }}/bin/mysqld"
      register: prepare_profile_mysqld

    - name: "[prepare] 检查 basedir MySQL 程序是否已安装"
      tags: [prepare]
      stat:
        path: "{{ mysql_basedir }}/bin/mysqld"
      register: prepare_mysqld_bin

    - name: "[prepare] 探测 basedir MySQL 完整版本"
      tags: [prepare]
      shell: >-
        {{ mysql_basedir }}/bin/mysqld --version 2>&1
        | grep -oE '{{ mysql_version_grep_pattern }}'
        | awk '{print $2}'
      register: prepare_basedir_version_out
      changed_when: false
      when: prepare_mysqld_bin.stat.exists | default(false)

    - name: "[prepare] 重算是否需要安装或升级 MySQL 软件"
      tags: [prepare]
      set_fact:
        mysql_need_software_install: >-
          {%- if prepare_mysqld_bin.stat.exists | default(false) -%}
          {{ (prepare_basedir_version_out.stdout | default('') | trim) is version(mysql_profile_full_version, '<') }}
          {%- else -%}
          true
          {%- endif -%}

    - name: "[prepare] 判定 prepare 阶段是否需要下载安装包"
      tags: [prepare]
      set_fact:
        mysql_prepare_need_download: >-
          {{ (mysql_need_software_install | bool)
             and not (prepare_profile_mysqld.stat.exists | default(false)) }}

    - name: "[prepare] 验证目标机可访问安装介质"
      tags: [prepare]
      uri:
        url: "{{ mysql_download_url }}"
        method: HEAD
        status_code: [200, 301, 302]
      when: mysql_prepare_need_download | default(false) | bool

    - name: "[prepare] 创建 mysql 组"
      tags: [prepare]
      group:
        name: mysql
        state: present

    - name: "[prepare] 创建 mysql 用户"
      tags: [prepare]
      user:
        name: mysql
        group: mysql
        shell: /sbin/nologin
        system: true
        create_home: false

    - name: "[prepare] 创建实例目录"
      tags: [prepare]
      file:
        path: "{{ item }}"
        state: directory
        owner: mysql
        group: mysql
        mode: "0750"
      loop:
        - "{{ mysql_instance_root }}"
        - "{{ mysql_datadir }}"
        - "{{ mysql_basedir | dirname }}"

    - name: "[prepare] 创建 binlog 目录"
      tags: [prepare]
      file:
        path: "{{ mysql_binlog_dir }}"
        state: directory
        owner: mysql
        group: mysql
        mode: "0750"
      when: mysql_enable_binlog | bool

    - name: "[install] 检查 MySQL 程序是否已安装"
      tags: [install]
      stat:
        path: "{{ mysql_basedir }}/bin/mysqld"
      register: mysqld_bin

    - name: "[install] 检查 Profile 介质目录"
      tags: [install]
      stat:
        path: "{{ mysql_package_dir }}/bin/mysqld"
      register: mysqld_profile_pkg

    - name: "[install] 探测 basedir MySQL 完整版本"
      tags: [install]
      shell: >-
        {{ mysql_basedir }}/bin/mysqld --version 2>&1
        | grep -oE '{{ mysql_version_grep_pattern }}'
        | awk '{print $2}'
      register: install_basedir_version_out
      changed_when: false
      when: mysqld_bin.stat.exists | default(false)

    - name: "[install] 判定是否需要安装或升级 MySQL 软件"
      tags: [install]
      set_fact:
        mysql_basedir_full_version: "{{ install_basedir_version_out.stdout | default('') | trim }}"
        mysql_need_software_install: >-
          {%- if mysqld_bin.stat.exists | default(false) -%}
          {{ (install_basedir_version_out.stdout | default('') | trim) is version(mysql_profile_full_version, '<') }}
          {%- else -%}
          true
          {%- endif -%}

    - name: "[install] 探测目标端口运行实例（软件升级前）"
      tags: [install]
      shell: |
        set -o pipefail
        PORT="{{ mysql_port }}"
        SERVICE="{{ mysql_service_name }}"
        CNF="{{ mysql_cnf_path }}"
        if ! ss -lntH "sport = :${PORT}" 2>/dev/null | grep -q .; then
          echo "free"
          exit 0
        fi
        if systemctl is-active --quiet "${SERVICE}" 2>/dev/null; then
          echo "platform"
          exit 0
        fi
        if ps -ef 2>/dev/null | grep '[m]ysqld' | grep -Fq "${CNF}"; then
          echo "platform"
          exit 0
        fi
        echo "foreign"
      args:
        executable: /bin/bash
      register: install_port_probe_raw
      changed_when: false
      when:
        - mysql_need_software_install | default(true) | bool
        - mysqld_bin.stat.exists | default(false)

    - name: "[install] 低版本软件升级前目标端口有运行实例"
      tags: [install]
      fail:
        msg: "有低minor版号的mysql运行实例正在运行,请先手工处理."
      when:
        - mysql_need_software_install | default(true) | bool
        - mysqld_bin.stat.exists | default(false)
        - (install_port_probe_raw.stdout | default('') | trim) == 'platform'
        - not (mysql_force_rebuild | bool)

    - name: "[install] 下载 MySQL 安装包"
      tags: [install]
      get_url:
        url: "{{ mysql_download_url }}"
        dest: "/tmp/{{ d.media.filename }}"
        mode: "0644"
      register: mysql_pkg
      when:
        - mysql_need_software_install | default(true) | bool
        - not mysqld_profile_pkg.stat.exists | default(false)

    - name: "[install] 解压安装包"
      tags: [install]
      unarchive:
        src: "/tmp/{{ d.media.filename }}"
        dest: "{{ mysql_basedir | dirname }}"
        remote_src: true
        creates: "{{ mysql_package_dir }}/bin/mysqld"
      register: unarchive_result
      when:
        - mysql_need_software_install | default(true) | bool
        - not mysqld_profile_pkg.stat.exists | default(false)

    - name: "[install] 刷新 Profile 介质目录状态"
      tags: [install]
      stat:
        path: "{{ mysql_package_dir }}/bin/mysqld"
      register: mysqld_profile_pkg_ready
      when: mysql_need_software_install | default(true) | bool

    - name: "[install] Profile 介质目录缺失"
      tags: [install]
      fail:
        msg: >-
          无法找到 Profile {{ d.profile.profile_code }} 对应介质目录 {{ mysql_package_dir }}，
          请检查安装包是否下载/解压成功。
      when:
        - mysql_need_software_install | default(true) | bool
        - not mysqld_profile_pkg_ready.stat.exists | default(false)

    - name: "[install] 建立 basedir 软链接"
      tags: [install]
      file:
        src: "{{ mysql_package_dir }}"
        dest: "{{ mysql_basedir }}"
        state: link
        force: true
      when: mysql_need_software_install | default(true) | bool

    - name: "[install] 设置程序目录权限"
      tags: [install]
      file:
        path: "{{ mysql_package_dir }}"
        state: directory
        owner: mysql
        group: mysql
        recurse: true
      when: mysql_need_software_install | default(true) | bool

    - name: "[install] 确认 MySQL 程序已就绪"
      tags: [install]
      stat:
        path: "{{ mysql_basedir }}/bin/mysqld"
      register: mysqld_bin_ready

    - name: "[install] 将 MySQL bin 目录加入系统 PATH（/etc/profile）"
      tags: [install]
      blockinfile:
        path: /etc/profile
        marker: "# {mark} DBATOOLBOX MANAGED MYSQL PATH"
        block: |
          export PATH={{ mysql_basedir }}/bin:$PATH
        create: false
      when: mysqld_bin_ready.stat.exists | default(false)

    - name: "[configure] 部署 my.cnf"
      tags: [configure]
      copy:
        dest: "{{ mysql_cnf_path }}"
        owner: mysql
        group: mysql
        mode: "0644"
        content: |
          [mysqld]
          basedir={{ mysql_basedir }}
          datadir={{ mysql_datadir }}
          port={{ mysql_port }}
          socket={{ mysql_socket }}
          bind-address={{ mysql_bootstrap_bind_address }}
          character-set-server={{ d.config.character_set | default('utf8mb4') }}
          collation-server={{ d.config.collation | default('utf8mb4_0900_ai_ci' if (mysql_profile_major is version('8.0', '>=')) else 'utf8mb4_unicode_ci') }}
          max_connections={{ d.config.max_connections | default(500) }}
          innodb_buffer_pool_size={{ d.config.innodb_buffer_pool_size | default('1G') }}
          default_authentication_plugin={{ d.config.default_authentication_plugin | default('caching_sha2_password' if (mysql_profile_major is version('8.0', '>=')) else 'mysql_native_password') }}
          log-error={{ mysql_log_error }}
          pid-file={{ mysql_datadir }}/mysqld.pid
          symbolic-links=0
          explicit_defaults_for_timestamp=1
          {% if mysql_enable_binlog | bool %}
          server_id={{ mysql_server_id }}
          log_bin={{ mysql_log_bin }}
          binlog_format={{ d.config.binlog_format | default('ROW') }}
          {% if mysql_enable_gtid | bool %}
          gtid_mode=ON
          enforce_gtid_consistency=ON
          log_slave_updates=ON
          {% endif %}
          {% else %}
          skip-log-bin
          {% endif %}
          [client]
          socket={{ mysql_socket }}
          default-character-set={{ d.config.character_set | default('utf8mb4') }}

    - name: "[initialize] 初始化数据目录"
      tags: [initialize]
      command: >
        {{ mysql_basedir }}/bin/mysqld
        --defaults-file={{ mysql_cnf_path }}
        --initialize-insecure
        --user=mysql
      args:
        creates: "{{ mysql_datadir }}/mysql"

    - name: "[start] 部署引导期 root 客户端凭据文件"
      tags: [start]
      copy:
        dest: "{{ mysql_root_client_cnf_path }}"
        owner: mysql
        group: mysql
        mode: "0600"
        content: |
          [client]
          user=root
          socket={{ mysql_socket }}

    - name: "[start] 部署 systemd 服务"
      tags: [start]
      copy:
        dest: "/etc/systemd/system/{{ mysql_service_name }}.service"
        mode: "0644"
        content: |
          [Unit]
          Description=MySQL Server {{ mysql_port }}
          After=network.target
          [Service]
          Type=forking
          User=mysql
          Group=mysql
          ExecStart={{ mysql_basedir }}/bin/mysqld --defaults-file={{ mysql_cnf_path }} --daemonize --pid-file={{ mysql_datadir }}/mysqld.pid
          ExecStop={{ mysql_basedir }}/bin/mysqladmin --defaults-extra-file={{ mysql_root_client_cnf_path }} shutdown
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target

    - name: "[start] 启动 MySQL"
      tags: [start]
      systemd:
        name: "{{ mysql_service_name }}"
        state: started
        enabled: true
        daemon_reload: true

    - name: "[post_config] 等待 MySQL 就绪"
      tags: [post_config]
      wait_for:
        port: "{{ mysql_port }}"
        delay: 3
        timeout: 120

    - name: "[post_config] 生成 root 密码 SQL"
      tags: [post_config]
      copy:
        dest: "{{ mysql_root_sql_path }}"
        mode: "0600"
        content: |
          ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password_sql }}';
          FLUSH PRIVILEGES;

    - name: "[post_config] 设置 root 密码"
      tags: [post_config]
      shell: |
        set -o pipefail
        MYSQL="{{ mysql_basedir }}/bin/mysql"
        SOCK="{{ mysql_socket }}"
        SQL="{{ mysql_root_sql_path }}"
        CNF="{{ mysql_root_client_cnf_path }}"
        if "$MYSQL" -uroot -S "$SOCK" < "$SQL"; then
          exit 0
        fi
        if "$MYSQL" --defaults-extra-file="$CNF" -Nse "SELECT 1" >/dev/null 2>&1; then
          exit 0
        fi
        if MYSQL_PWD="$MYSQL_ROOT_PASSWORD" "$MYSQL" -uroot -S "$SOCK" -Nse "SELECT 1" >/dev/null 2>&1; then
          exit 0
        fi
        echo "root 密码设置失败：无法用空密码或目标密码连接 MySQL" >&2
        exit 1
      args:
        executable: /bin/bash
      environment:
        MYSQL_ROOT_PASSWORD: "{{ d.credentials.root_password }}"
      register: root_pwd

    - name: "[post_config] 部署 root 客户端凭据文件"
      tags: [post_config]
      copy:
        dest: "{{ mysql_root_client_cnf_path }}"
        owner: mysql
        group: mysql
        mode: "0600"
        content: |
          [client]
          user=root
          password="{{ d.credentials.root_password | replace('"', '\\"') }}"
          socket={{ mysql_socket }}

    - name: "[post_config] 生成 DBA 账号 SQL"
      tags: [post_config]
      copy:
        dest: "{{ mysql_admin_sql_path }}"
        mode: "0600"
        content: |
          CREATE USER IF NOT EXISTS '{{ mysql_admin_name }}'@'{{ mysql_admin_host }}' IDENTIFIED BY '{{ mysql_admin_pswd_sql }}';
          {% for grant_sql in d.credentials.dba_grant_statements | default([]) %}
          {{ grant_sql | replace('__DBA_USER__', mysql_admin_name) | replace('__DBA_HOST__', mysql_admin_host) }}
          {% endfor %}
          FLUSH PRIVILEGES;
      when:
        - d.credentials.admin_account is defined
        - d.credentials.admin_account.account_name is defined
        - d.credentials.admin_account.account_pswd is defined

    - name: "[post_config] 创建高级 DBA 运维账号"
      tags: [post_config]
      shell: |
        set -o pipefail
        {{ mysql_basedir }}/bin/mysql --defaults-extra-file={{ mysql_root_client_cnf_path | quote }} < {{ mysql_admin_sql_path | quote }}
      args:
        executable: /bin/bash
      when:
        - d.credentials.admin_account is defined
        - d.credentials.admin_account.account_name is defined
        - d.credentials.admin_account.account_pswd is defined
      register: admin_user
      changed_when: admin_user.rc == 0

    - name: "[post_config] 放开 bind-address 对外监听"
      tags: [post_config]
      replace:
        path: "{{ mysql_cnf_path }}"
        regexp: '^bind-address\s*=.*'
        replace: "bind-address={{ mysql_bind_address }}"
      register: mysql_bind_updated

    - name: "[post_config] 重启 MySQL 以应用对外监听"
      tags: [post_config]
      systemd:
        name: "{{ mysql_service_name }}"
        state: restarted
        daemon_reload: true
      when: mysql_bind_updated.changed | default(false)

    - name: "[post_config] 等待对外监听就绪"
      tags: [post_config]
      wait_for:
        port: "{{ mysql_port }}"
        delay: 2
        timeout: 120
      when: mysql_bind_updated.changed | default(false)

    - name: "[post_config] 清理临时 SQL 与历史凭据文件"
      tags: [post_config]
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ mysql_root_sql_path }}"
        - "{{ mysql_admin_sql_path }}"
        - "{{ mysql_legacy_client_cnf_path }}"

    - name: "[verify] 探测版本"
      tags: [verify]
      shell: |
        set -o pipefail
        {{ mysql_basedir }}/bin/mysql --defaults-extra-file={{ mysql_root_client_cnf_path | quote }} -Nse "SELECT VERSION();"
      args:
        executable: /bin/bash
      register: mysql_version
      changed_when: false

    - name: "[verify] 部署版本低于 Profile 要求"
      tags: [verify]
      fail:
        msg: >-
          运行版本 {{ mysql_version.stdout | trim }} 低于 Profile {{ d.profile.profile_code }}
          要求 {{ mysql_profile_full_version }}，任务终止。
      when: (mysql_version.stdout | trim) is version(mysql_profile_full_version, '<')

    - name: "[verify] 部署版本 major 与 Profile 不一致"
      tags: [verify]
      fail:
        msg: >-
          运行版本 {{ mysql_version.stdout | trim }} 与 Profile {{ d.profile.profile_code }}
          major={{ d.profile.major_version }} 不一致，任务终止。
      when: not (mysql_version.stdout | trim).startswith(d.profile.major_version ~ '.')

    - name: "[verify] 输出版本"
      tags: [verify]
      debug:
        msg: "MySQL version={{ mysql_version.stdout | trim }}"
