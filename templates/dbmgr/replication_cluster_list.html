{% extends "base.html" %}
{% block title %}复制集集群 - DBAToolbox{% endblock %}

{% block content %}
<div class="breadcrumb">数据库管理 / 复制集集群</div>

<div class="layui-card">
    <div class="layui-card-header"><span>复制集集群列表</span></div>
    <div class="layui-card-body">
        <div class="layui-form layui-form-item" style="margin-bottom:10px;">
            <div class="layui-inline">
                <select id="filter-engine" lay-ignore style="height:38px;border:1px solid #e6e6e6;border-radius:2px;padding:0 8px;min-width:140px;">
                    <option value="">全部类型</option>
                </select>
            </div>
            <div class="layui-inline">
                <input type="text" id="search-keyword" placeholder="复制集名称搜索" class="layui-input" style="width:260px;">
            </div>
            <button class="layui-btn" id="btn-search"><i class="layui-icon layui-icon-search"></i> 搜索</button>
            <button class="layui-btn layui-btn-normal" id="btn-add"><i class="layui-icon layui-icon-add-1"></i> 添加</button>
        </div>
        <table id="main-table" lay-filter="main-table"></table>
    </div>
</div>

<script type="text/html" id="action-bar">
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">修改</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>
{% endblock %}

{% block extra_script %}
<script>
var engines = {{ engines|safe }};
var replicationTypes = {{ replication_types|safe }};
var instances = {{ instances|safe }};

function buildSelect(name, list, currentVal, placeholder, valueField, labelField) {
    valueField = valueField || 'value';
    labelField = labelField || 'label';
    var s = '<select name="' + name + '" lay-ignore style="width:100%;height:38px;border:1px solid #e6e6e6;border-radius:2px;padding:0 8px;">'
        + '<option value="">' + (placeholder || '请选择') + '</option>';
    for (var i = 0; i < list.length; i++) {
        var val = list[i][valueField];
        var sel = (String(val) === String(currentVal)) ? ' selected' : '';
        s += '<option value="' + val + '"' + sel + '>' + list[i][labelField] + '</option>';
    }
    s += '</select>';
    return s;
}

function filterInstances(engine, clusterId) {
    return instances.filter(function(item) {
        if (engine && item.engine !== engine) return false;
        if (!clusterId) return true;
        return !item.replication_cluster_id || item.replication_cluster_id == clusterId;
    });
}

function initEngineFilter() {
    var $sel = $('#filter-engine');
    for (var i = 0; i < engines.length; i++) {
        $sel.append('<option value="' + engines[i].value + '">' + engines[i].label + '</option>');
    }
}

layui.use(['table', 'layer'], function() {
    var table = layui.table;
    var layer = layui.layer;
    initEngineFilter();

    var tableIns = table.render({
        elem: '#main-table',
        url: '/replication-cluster/api/',
        page: true,
        limit: 10,
        limits: [10, 20, 50, 100],
        cols: [[
            {field: 'id', title: 'ID', width: 70},
            {field: 'name', title: '复制集名称', width: 180},
            {field: 'engine__display', title: '数据库类型', width: 110},
            {field: 'replication_type__display', title: '复制类型', width: 150},
            {field: 'primary_instance__display', title: '当前主实例', width: 180},
            {field: 'instance_count', title: '实例数', width: 80},
            {field: 'remark', title: '备注', minWidth: 120},
            {title: '操作', width: 120, toolbar: '#action-bar', fixed: 'right'}
        ]],
        defaultToolbar: [],
        request: {pageName: 'page', limitName: 'limit'},
        response: {statusCode: 0, countName: 'count', dataName: 'data'},
        parseData: function(res) {
            return {code: res.code, msg: res.msg, count: res.count, data: res.data};
        }
    });

    function reloadTable() {
        tableIns.reload({
            where: {
                keyword: $('#search-keyword').val(),
                engine: $('#filter-engine').val()
            }
        });
    }

    $('#btn-search').click(reloadTable);
    $('#filter-engine').change(reloadTable);
    $('#search-keyword').keydown(function(e) { if (e.keyCode === 13) reloadTable(); });

    table.on('tool(main-table)', function(obj) {
        if (obj.event === 'del') {
            layer.confirm('确认删除该复制集？', {icon: 3}, function(idx) {
                $.ajax({
                    url: '/replication-cluster/api/',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify({id: obj.data.id}),
                    headers: {'X-CSRFToken': getCookie('csrftoken_dbatoolbox')},
                    success: function(r) {
                        if (r.code === 0) { layer.msg(r.msg, {icon: 1}); reloadTable(); }
                        else { layer.msg(r.msg, {icon: 2}); }
                    }
                });
                layer.close(idx);
            });
        } else if (obj.event === 'edit') {
            openForm('修改复制集', obj.data);
        }
    });

    $('#btn-add').click(function() { openForm('添加复制集'); });

    function openForm(title, data) {
        data = data || {};
        var instList = filterInstances(data.engine, data.id);
        var html = '<div style="padding:20px 25px 10px;">'
            + '<form class="layui-form">'
            + '<input type="hidden" id="obj-id" value="' + (data.id || '') + '">'
            + '<table class="layui-table" style="margin:0;"><tbody>'
            + '<tr>'
                + '<td style="width:18%;text-align:right;">复制集名称</td><td style="width:32%;"><input type="text" id="f-name" class="layui-input" value="' + (data.name || '') + '"></td>'
                + '<td style="width:18%;text-align:right;">数据库类型</td><td style="width:32%;">' + buildSelect('f-engine', engines, data.engine, '请选择') + '</td>'
            + '</tr>'
            + '<tr>'
                + '<td style="text-align:right;">复制类型</td><td>' + buildSelect('f-replication-type', replicationTypes, data.replication_type, '请选择') + '</td>'
                + '<td style="text-align:right;">当前主实例</td><td>' + buildSelect('f-primary-instance', instList, data.primary_instance_id, '可选', 'id', 'instance_name') + '</td>'
            + '</tr>'
            + '<tr>'
                + '<td style="text-align:right;">备注</td><td colspan="3"><input type="text" id="f-remark" class="layui-input" value="' + (data.remark || '') + '"></td>'
            + '</tr>'
            + '</tbody></table></form></div>';

        layer.open({
            type: 1,
            title: title,
            area: ['760px', '320px'],
            content: html,
            btn: ['保存', '取消'],
            yes: function(index) {
                var payload = {
                    id: $('#obj-id').val(),
                    name: $('#f-name').val().trim(),
                    engine: $('select[name="f-engine"]').val(),
                    replication_type: $('select[name="f-replication-type"]').val(),
                    primary_instance_id: $('select[name="f-primary-instance"]').val() || null,
                    remark: $('#f-remark').val().trim()
                };
                if (!payload.name) { layer.msg('请填写复制集名称', {icon: 2}); return; }
                if (!payload.engine) { layer.msg('请选择数据库类型', {icon: 2}); return; }
                if (!payload.replication_type) { layer.msg('请选择复制类型', {icon: 2}); return; }

                var isEdit = !!payload.id;
                $.ajax({
                    url: '/replication-cluster/api/',
                    type: isEdit ? 'PUT' : 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    headers: {'X-CSRFToken': getCookie('csrftoken_dbatoolbox')},
                    success: function(r) {
                        if (r.code === 0) { layer.msg(r.msg, {icon: 1}); layer.close(index); reloadTable(); }
                        else { layer.msg(r.msg, {icon: 2}); }
                    }
                });
            },
            btn2: function(index) { layer.close(index); }
        });
    }

    function getCookie(name) {
        var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
        return r ? r[1] : '';
    }
});
</script>
{% endblock %}
