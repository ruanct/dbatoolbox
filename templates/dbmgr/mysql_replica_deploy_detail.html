{% extends "base.html" %}
{% block title %}MySQL从库部署详情 - DBAToolbox{% endblock %}

{% block content %}
<div class="breadcrumb">
    数据库管理 / 实例部署 / <a href="/db-deploy/mysql-replica/">添加MySQL从库</a> / 任务 #{{ job_id }}
</div>

<style>
#step-table {
    table-layout: fixed;
    width: 100%;
}
#step-table col.col-step-no { width: 50px; }
#step-table col.col-step-name { width: 120px; }
#step-table col.col-step-status { width: 90px; }
#step-table col.col-step-start { width: 150px; }
#step-table col.col-step-end { width: 150px; }
#step-table th,
#step-table td {
    overflow: hidden;
}
#step-table td.step-name-cell,
#step-table td.step-status-cell,
#step-table td.step-time-cell {
    white-space: nowrap;
    text-overflow: ellipsis;
}
#step-table td.step-output-cell {
    overflow: auto;
    word-break: break-all;
    white-space: normal;
}
</style>

<div class="layui-card">
    <div class="layui-card-header">
        <span>MySQL 从库部署详情</span>
        <button class="layui-btn layui-btn-xs layui-btn-primary" style="float:right;margin-top:8px;" id="btn-back">返回列表</button>
        <button class="layui-btn layui-btn-xs layui-btn-danger" style="float:right;margin-top:8px;margin-right:8px;display:none;" id="btn-delete">删除</button>
        <button class="layui-btn layui-btn-xs layui-btn-warm" style="float:right;margin-top:8px;margin-right:8px;display:none;" id="btn-cancel">取消</button>
        <button class="layui-btn layui-btn-xs layui-btn-warm" style="float:right;margin-top:8px;margin-right:8px;display:none;" id="btn-release-endpoint">释放端点</button>
        <button class="layui-btn layui-btn-xs layui-btn-normal" style="float:right;margin-top:8px;margin-right:8px;display:none;" id="btn-retry">重新执行</button>
        <button class="layui-btn layui-btn-xs" style="float:right;margin-top:8px;margin-right:8px;" id="btn-refresh">刷新</button>
    </div>
    <div class="layui-card-body">
        <table class="layui-table" lay-size="sm" id="job-info">
            <tbody></tbody>
        </table>
        <fieldset class="layui-elem-field layui-field-title" style="margin-top:16px;">
            <legend>执行步骤</legend>
        </fieldset>
        <table class="layui-table" lay-size="sm" id="step-table">
            <colgroup>
                <col class="col-step-no">
                <col class="col-step-name">
                <col class="col-step-status">
                <col class="col-step-start">
                <col class="col-step-end">
                <col>
            </colgroup>
            <thead>
                <tr>
                    <th>#</th>
                    <th>步骤</th>
                    <th>状态</th>
                    <th>开始</th>
                    <th>结束</th>
                    <th>输出</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_script %}
<script>
var jobId = {{ job_id }};
var pollTimer = null;
var lastJobData = null;

function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : '';
}

function postJobAction(action, confirmText, onSuccess) {
    layer.confirm(confirmText, {icon: 3, title: '确认'}, function(index) {
        layer.close(index);
        $.ajax({
            url: '/db-deploy/mysql-replica/api/' + jobId + '/',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({action: action}),
            headers: {'X-CSRFToken': getCookie('csrftoken_dbatoolbox')},
            success: function(r) {
                if (r.code === 0) {
                    layer.msg(r.msg, {icon: 1});
                    if (onSuccess) onSuccess();
                    loadDetail();
                } else {
                    layer.msg(r.msg || '操作失败', {icon: 2});
                }
            },
            error: function(xhr) {
                layer.msg((xhr.responseJSON || {}).msg || '请求失败', {icon: 2});
            }
        });
    });
}

function countSucceededSteps(steps) {
    var count = 0;
    for (var i = 0; i < steps.length; i++) {
        if (steps[i].status === 'succeeded') {
            count++;
        }
    }
    return count;
}

function findFirstFailedStep(steps) {
    for (var i = 0; i < steps.length; i++) {
        if (steps[i].status === 'failed') {
            return steps[i];
        }
    }
    return null;
}

function buildRetryConfirmText(data) {
    if (!data || data.status !== 'failed') {
        return '确定重新执行该从库部署任务吗？';
    }
    var steps = data.steps || [];
    var failedStep = findFirstFailedStep(steps);
    var succeededCount = countSucceededSteps(steps);
    if (failedStep && succeededCount > 0) {
        return '将从失败步骤「' + failedStep.step_name + '」继续执行，'
            + '已成功完成的 ' + succeededCount + ' 个步骤将自动跳过。确定继续吗？';
    }
    return '确定重新执行该从库部署任务吗？';
}

function updateActionButtons(status, steps, data) {
    steps = steps || [];
    data = data || null;
    var showRetry = status === 'pending' || status === 'failed' || status === 'cancelled';
    var failedStep = status === 'failed' ? findFirstFailedStep(steps) : null;
    var succeededCount = countSucceededSteps(steps);
    var retryLabel = (failedStep && succeededCount > 0) ? '继续执行' : '重新执行';
    $('#btn-retry').text(retryLabel).toggle(showRetry);
    var showReleaseEndpoint = status === 'failed' && !data.instance_id;
    $('#btn-release-endpoint').toggle(showReleaseEndpoint);
    $('#btn-cancel').toggle(status === 'pending');
    $('#btn-delete').toggle(
        status === 'pending' || status === 'failed' || status === 'cancelled'
    );
}

function statusColor(status) {
    if (status === 'succeeded') return '#5fb878';
    if (status === 'failed') return '#ff5722';
    if (status === 'running' || status === 'prechecking' || status === 'verifying') return '#1e9fff';
    return '#999';
}

function bootstrapMethodLabel(method) {
    if (method === 'mysqldump') return 'mysqldump（第一期）';
    if (method === 'xtrabackup') return 'XtraBackup';
    if (method === 'clone') return 'MySQL Clone';
    return method || '-';
}

function renderJob(data) {
    lastJobData = data;
    var ctx = (data.resolved_params && data.resolved_params.context) ? data.resolved_params.context : {};
    var cmdb = (data.resolved_params && data.resolved_params.cmdb) ? data.resolved_params.cmdb : {};
    var ins = (data.resolved_params && data.resolved_params.install) ? data.resolved_params.install : {};
    var cfg = (data.resolved_params && data.resolved_params.config) ? data.resolved_params.config : {};
    var replStatus = (data.result && data.result.replication_status) ? data.result.replication_status : null;

    var rows = [
        ['任务ID', data.id],
        ['部署类型', data.job_type__display],
        ['主库实例', data.master_instance__display || cmdb.master_instance_name || '-'],
        ['复制连接', (ctx.master_host || '-') + ':' + (ctx.master_port || '-')],
        ['CMDB 主库入口', ctx.master_connect_host || '-'],
        ['全量方式', bootstrapMethodLabel(data.bootstrap_method || ctx.bootstrap_method)],
        ['半同步', (ctx.enable_semi_sync || data.enable_semi_sync) ? '开启' : '关闭'],
        ['版本档案', data.version_profile_code],
        ['从库主机', data.target_host__display],
        ['从库实例名', cmdb.instance_name || '-'],
        ['环境/业务', data.environment__display + ' / ' + data.business__display],
        ['任务状态', '<span style="color:' + statusColor(data.status) + ';">' + data.status__display + '</span>'],
        ['注册实例', data.instance_id ? ('<a href="/db-instance/">' + data.instance__display + '</a>') : '-'],
        ['错误信息', data.error_message || '-'],
        ['开始/结束', (data.started_at || '-') + ' ~ ' + (data.finished_at || '-')],
        ['探测版本', (data.result && data.result.detected_version) ? data.result.detected_version : '-']
    ];

    rows.push(['从库端口', cmdb.port || '-']);
    rows.push(['程序目录', ins.basedir || '-']);
    rows.push(['参数文件', ins.cnf_path || '-']);
    rows.push(['数据目录', ins.datadir || '-']);
    rows.push(['Socket', ins.socket || '-']);
    rows.push(['系统服务', (ins.service_name || '-') + '.service']);
    if (cfg.server_id) {
        rows.push(['server_id', cfg.server_id]);
    }
    if (ctx.same_host_as_master) {
        rows.push(['同机部署', '是（复制地址 127.0.0.1）']);
    }

    if (replStatus) {
        rows.push(['IO 线程', replStatus.io_running || '-']);
        rows.push(['SQL 线程', replStatus.sql_running || '-']);
        rows.push(['复制延迟', replStatus.seconds_behind != null ? replStatus.seconds_behind + 's' : '-']);
        if (replStatus.last_io_error) {
            rows.push(['IO 错误', replStatus.last_io_error]);
        }
        if (replStatus.last_sql_error) {
            rows.push(['SQL 错误', replStatus.last_sql_error]);
        }
    }

    var html = '';
    for (var i = 0; i < rows.length; i++) {
        html += '<tr><td width="140">' + rows[i][0] + '</td><td>' + rows[i][1] + '</td></tr>';
    }
    $('#job-info tbody').html(html);

    var stepHtml = '';
    var steps = data.steps || [];
    for (var j = 0; j < steps.length; j++) {
        var s = steps[j];
        var out = (s.output || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        stepHtml += '<tr>'
            + '<td>' + s.sort_order + '</td>'
            + '<td class="step-name-cell" title="' + (s.step_name || '').replace(/"/g, '&quot;') + '">' + s.step_name + '</td>'
            + '<td class="step-status-cell" style="color:' + statusColor(s.status) + ';">' + s.status__display + '</td>'
            + '<td class="step-time-cell">' + (s.started_at || '-') + '</td>'
            + '<td class="step-time-cell">' + (s.finished_at || '-') + '</td>'
            + '<td class="step-output-cell"><pre style="margin:0;white-space:pre-wrap;max-height:120px;overflow:auto;font-size:12px;">' + out + '</pre></td>'
            + '</tr>';
    }
    $('#step-table tbody').html(stepHtml);
    updateActionButtons(data.status, steps, data);

    var running = ['pending', 'prechecking', 'running', 'verifying'].indexOf(data.status) >= 0;
    if (running && !pollTimer) {
        pollTimer = setInterval(loadDetail, 3000);
    }
    if (!running && pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
    }
}

function loadDetail() {
    $.getJSON('/db-deploy/mysql-replica/api/' + jobId + '/', function(res) {
        if (res.code === 0) {
            renderJob(res.data);
        } else {
            layer.msg(res.msg || '加载失败', {icon: 2});
        }
    });
}

$('#btn-refresh').on('click', loadDetail);
$('#btn-back').on('click', function() { window.location.href = '/db-deploy/mysql-replica/'; });
$('#btn-retry').on('click', function() {
    postJobAction('retry', buildRetryConfirmText(lastJobData));
});
$('#btn-release-endpoint').on('click', function() {
    postJobAction(
        'release_endpoint',
        '将把任务标记为「已取消」并释放其占用的连接端点。任务记录与步骤日志保留。确定继续吗？'
    );
});
$('#btn-cancel').on('click', function() {
    postJobAction('cancel', '确定取消该待执行任务吗？');
});
$('#btn-delete').on('click', function() {
    layer.confirm('确定删除该从库部署任务吗？删除后不可恢复。', {icon: 3, title: '确认'}, function(index) {
        layer.close(index);
        $.ajax({
            url: '/db-deploy/mysql-replica/api/' + jobId + '/',
            type: 'DELETE',
            headers: {'X-CSRFToken': getCookie('csrftoken_dbatoolbox')},
            success: function(r) {
                if (r.code === 0) {
                    layer.msg(r.msg, {icon: 1}, function() {
                        window.location.href = '/db-deploy/mysql-replica/';
                    });
                } else {
                    layer.msg(r.msg || '删除失败', {icon: 2});
                }
            },
            error: function(xhr) {
                layer.msg((xhr.responseJSON || {}).msg || '请求失败', {icon: 2});
            }
        });
    });
});

$(function() {
    loadDetail();
});
</script>
{% endblock %}
