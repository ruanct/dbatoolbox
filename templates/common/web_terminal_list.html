{% extends "base.html" %}
{% block title %}网页终端 - DBAToolbox{% endblock %}

{% block content %}
<div class="breadcrumb">运维管理 / 网页终端</div>

<div class="layui-card">
    <div class="layui-card-header"><span>选择目标主机</span></div>
    <div class="layui-card-body">
        <div class="layui-form layui-form-item" style="margin-bottom:10px;">
            <div class="layui-inline">
                <input type="text" id="search-keyword" placeholder="主机名/IP搜索" class="layui-input" style="width:260px;">
            </div>
            <button class="layui-btn" id="btn-search"><i class="layui-icon layui-icon-search"></i> 搜索</button>
        </div>
        <table id="main-table" lay-filter="main-table"></table>
    </div>
</div>

<script type="text/html" id="action-bar">
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="connect">连接</a>
</script>
{% endblock %}

{% block extra_script %}
<script>
layui.use(['table'], function() {
    var table = layui.table;

    var allData = [];

    function reloadTable(keyword) {
        var filtered = allData;
        if (keyword) {
            keyword = keyword.toLowerCase();
            filtered = allData.filter(function(h) {
                return (h.display_name || '').toLowerCase().indexOf(keyword) >= 0
                    || (h.hostname || '').toLowerCase().indexOf(keyword) >= 0
                    || (h.first_ip || '').indexOf(keyword) >= 0;
            });
        }
        table.reload('main-table', {data: filtered});
    }

    table.render({
        elem: '#main-table',
        data: [],
        page: true,
        limit: 15,
        limits: [15, 30, 50, 100],
        cols: [[
            {field: 'id', title: 'ID', width: 60},
            {field: 'display_name', title: '主机名称', width: 200},
            {field: 'hostname', title: '主机标识', width: 150},
            {field: 'first_ip', title: 'IP 地址', width: 160},
            {title: '操作', width: 100, toolbar: '#action-bar'}
        ]],
        defaultToolbar: [],
    });

    // 加载主机列表
    $.get('/web-terminal/hosts/', function(res) {
        if (res.code === 0) {
            allData = res.data;
            table.reload('main-table', {data: allData});
        }
    });

    $('#btn-search').click(function() {
        reloadTable($('#search-keyword').val());
    });
    $('#search-keyword').keydown(function(e) {
        if (e.keyCode === 13) reloadTable($(this).val());
    });

    table.on('tool(main-table)', function(obj) {
        if (obj.event === 'connect') {
            window.open('/web-terminal/' + obj.data.id + '/', '_blank');
        }
    });
});
</script>
{% endblock %}
