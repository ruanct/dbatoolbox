{% extends "base.html" %}
{% block title %}脚本仓库 - DBAToolbox{% endblock %}

{% block content %}
<div class="breadcrumb">运维管理 / 脚本仓库</div>

<div class="layui-card">
    <div class="layui-card-header"><span>脚本仓库列表</span></div>
    <div class="layui-card-body">
        <div class="layui-form layui-form-item" style="margin-bottom:10px;">
            <div class="layui-inline">
                <select id="filter-category" lay-ignore style="height:38px;border:1px solid #e6e6e6;border-radius:2px;padding:0 8px;">
                    <option value="">脚本分类</option>
                </select>
            </div>
            <div class="layui-inline">
                <select id="filter-type" lay-ignore style="height:38px;border:1px solid #e6e6e6;border-radius:2px;padding:0 8px;">
                    <option value="">脚本类型</option>
                </select>
            </div>
            <div class="layui-inline">
                <input type="text" id="search-keyword" placeholder="脚本名/描述/创建人搜索" class="layui-input" style="width:260px;">
            </div>
            <button class="layui-btn" id="btn-search"><i class="layui-icon layui-icon-search"></i> 搜索</button>
            <button class="layui-btn layui-btn-normal" id="btn-add"><i class="layui-icon layui-icon-add-1"></i> 添加</button>
        </div>
        <table id="main-table" lay-filter="main-table"></table>
    </div>
</div>

<script type="text/html" id="action-bar">
    <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">修改</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>

{% verbatim %}
<script type="text/html" id="name-click-tpl">
    <a href="javascript:;" class="script-name-link" style="color:#1e9fff;">{{ d.name }}</a>
</script>
{% endverbatim %}
{% endblock %}

{% block extra_script %}
<script>
var scriptTypes = {{ script_types|safe }};
var categoriesTree = {{ categories_tree|safe }};

function buildCategorySelect(currentVal) {
    var s = '<select id="f-category-id" lay-ignore style="width:100%;height:38px;border:1px solid #e6e6e6;border-radius:2px;padding:0 8px;">'
        + '<option value="">请选择分类</option>';
    for (var i = 0; i < categoriesTree.length; i++) {
        var cat = categoriesTree[i];
        var sel = (cat.id == currentVal) ? ' selected' : '';
        s += '<option value="' + cat.id + '"' + sel + '>' + cat.display + '</option>';
    }
    s += '</select>';
    return s;
}

function buildTypeSelect(currentVal) {
    var s = '<select id="f-script-type" lay-ignore style="width:100%;height:38px;border:1px solid #e6e6e6;border-radius:2px;padding:0 8px;">';
    for (var i = 0; i < scriptTypes.length; i++) {
        var t = scriptTypes[i];
        var sel = (t.value == currentVal) ? ' selected' : '';
        s += '<option value="' + t.value + '"' + sel + '>' + t.label + '</option>';
    }
    s += '</select>';
    return s;
}

function buildStatusSelect(currentVal) {
    var s = '<select id="f-status" lay-ignore style="width:100%;height:38px;border:1px solid #e6e6e6;border-radius:2px;padding:0 8px;">';
    s += '<option value="enabled"' + (currentVal === 'enabled' ? ' selected' : '') + '>启用</option>';
    s += '<option value="disabled"' + (currentVal === 'disabled' ? ' selected' : '') + '>停用</option>';
    s += '</select>';
    return s;
}

layui.use(['table', 'layer', 'form'], function() {
    var table = layui.table;
    var layer = layui.layer;

    var tableIns = table.render({
        elem: '#main-table',
        url: '/script-repository/api/',
        page: true,
        limit: 10,
        limits: [10, 20, 50, 100],
        cols: [[
            {field: 'id', title: 'ID', width: 30},
            {field: 'name', title: '脚本名称', width: 280, templet: '#name-click-tpl'},
            {field: 'category__name', title: '脚本分类', width: 90},
            {field: 'script_type__display', title: '脚本类型', width: 90},
            {field: 'version', title: '版本', width: 70},
            {field: 'status__display', title: '状态', width: 70},
            {field: 'creator', title: '创建人', width: 90},
            {field: 'description', title: '功能描述', width: 200},
            {title: '操作', width: 180, toolbar: '#action-bar'}
        ]],
        defaultToolbar: [],
        request: {pageName: 'page', limitName: 'limit'},
        response: {statusCode: 0, countName: 'count', dataName: 'data'},
        parseData: function(res) {
            return {code: res.code, msg: res.msg, count: res.count, data: res.data};
        }
    });

    // 初始化筛选下拉框
    var $filterCategory = $('#filter-category');
    for (var i = 0; i < categoriesTree.length; i++) {
        $filterCategory.append('<option value="' + categoriesTree[i].id + '">' + categoriesTree[i].display + '</option>');
    }
    var $filterType = $('#filter-type');
    for (var i = 0; i < scriptTypes.length; i++) {
        $filterType.append('<option value="' + scriptTypes[i].value + '">' + scriptTypes[i].label + '</option>');
    }

    function reloadTable() {
        tableIns.reload({where: {
            keyword: $('#search-keyword').val(),
            category_id: $('#filter-category').val(),
            script_type: $('#filter-type').val()
        }});
    }

    $('#btn-search').click(reloadTable);
    $('#search-keyword').keydown(function(e) { if (e.keyCode === 13) reloadTable(); });
    $('#filter-category, #filter-type').change(reloadTable);

    table.on('tool(main-table)', function(obj) {
        if (obj.event === 'view') {
            viewDetail(obj.data);
        } else if (obj.event === 'del') {
            layer.confirm('确认删除脚本「' + obj.data.name + '」？', {icon: 3}, function(idx) {
                $.ajax({
                    url: '/script-repository/api/',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify({id: obj.data.id}),
                    headers: {'X-CSRFToken': getCookie('csrftoken_dbatoolbox')},
                    success: function(r) {
                        if (r.code === 0) { layer.msg(r.msg, {icon: 1}); layer.close(idx); location.reload(); }
                        else { layer.msg(r.msg, {icon: 2}); }
                    }
                });
                layer.close(idx);
            });
        } else if (obj.event === 'edit') {
            openForm('修改脚本信息', obj.data);
        }
    });

    $('#btn-add').click(function() { openForm('添加脚本信息'); });

    // 点击脚本名称触发查看
    $(document).on('click', '.script-name-link', function() {
        var tr = $(this).closest('tr[data-index]');
        var index = tr.attr('data-index');
        var rowData = table.cache['main-table'][index];
        if (rowData) { viewDetail(rowData); }
    });

    function viewDetail(data) {
        layer.open({
            type: 1,
            title: '脚本明细 - ' + data.name,
            area: ['1200px', '800px'],
            content: '<div style="padding:20px 25px;">'
                + '<table class="layui-table" style="margin:0;"><tbody>'
                + '<tr><td style="width:100px;text-align:right;font-weight:bold;">脚本名称</td><td>' + (data.name || '') + '</td>'
                + '<td style="width:100px;text-align:right;font-weight:bold;">所属分类</td><td>' + (data.category__name || '无') + '</td></tr>'
                + '<tr><td style="text-align:right;font-weight:bold;">脚本类型</td><td>' + (data.script_type__display || '') + '</td>'
                + '<td style="text-align:right;font-weight:bold;">版本号</td><td>' + (data.version || '') + '</td></tr>'
                + '<tr><td style="text-align:right;font-weight:bold;">状态</td><td>' + (data.status__display || '') + '</td>'
                + '<td style="text-align:right;font-weight:bold;">创建人</td><td>' + (data.creator || '') + '</td></tr>'
                + '<tr><td style="text-align:right;font-weight:bold;">功能描述</td><td>' + (data.description || '') + '</td>'
                + '<td style="text-align:right;font-weight:bold;">备注</td><td>' + (data.remark || '') + '</td></tr>'
                + '<tr><td style="text-align:right;font-weight:bold;vertical-align:top;">脚本内容</td>'
                + '<td colspan="3"><pre style="margin:0;padding:8px;background:#f5f5f5;border-radius:2px;min-height:430px;max-height:800px;overflow:auto;font-family:monospace;white-space:pre-wrap;word-wrap:break-word;">' + (data.content || '') + '</pre></td></tr>'
                + '</tbody></table></div>',
            btn: ['关闭'],
            yes: function(index) { layer.close(index); }
        });
    }

    function openForm(title, data) {
        data = data || {};
        var html = '<div style="padding:15px 20px 10px;">'
            + '<form class="layui-form">'
            + '<input type="hidden" id="obj-id" value="' + (data.id || '') + '">'
            + '<table class="layui-table" style="margin:0;"><tbody>'
            + '<tr>'
                + '<td style="width:14%;text-align:right;">脚本名称</td><td style="width:36%;"><input type="text" id="f-name" class="layui-input" value="' + (data.name || '') + '"></td>'
                + '<td style="width:14%;text-align:right;">所属分类</td><td style="width:36%;">' + buildCategorySelect(data.category_id) + '</td>'
            + '</tr>'
            + '<tr>'
                + '<td style="text-align:right;">脚本类型</td><td>' + buildTypeSelect(data.script_type || 'shell') + '</td>'
                + '<td style="text-align:right;">版本号</td><td><input type="text" id="f-version" class="layui-input" value="' + (data.version || '1.0') + '"></td>'
            + '</tr>'
            + '<tr>'
                + '<td style="text-align:right;">状态</td><td>' + buildStatusSelect(data.status || 'enabled') + '</td>'
                + '<td style="text-align:right;">创建人</td><td><input type="text" id="f-creator" class="layui-input" value="' + (data.creator || '') + '"></td>'
            + '</tr>'
            + '<tr>'
                + '<td style="text-align:right;">功能描述</td><td colspan="3"><input type="text" id="f-description" class="layui-input" value="' + (data.description || '') + '"></td>'
            + '</tr>'
            + '<tr>'
                + '<td style="text-align:right;">脚本内容</td><td colspan="3"><textarea id="f-content" class="layui-textarea" style="height:370px;font-family:monospace;">' + (data.content || '') + '</textarea></td>'
            + '</tr>'
            + '<tr>'
                + '<td style="text-align:right;">备注</td><td colspan="3"><input type="text" id="f-remark" class="layui-input" value="' + (data.remark || '') + '"></td>'
            + '</tr>'
            + '</tbody></table></form></div>';

        layer.open({
            type: 1,
            title: title,
            area: ['1200px', '800px'],
            content: html,
            btn: ['保存', '取消'],
            yes: function(index, layero) {
                var payload = {
                    id: $('#obj-id').val(),
                    name: $('#f-name').val().trim(),
                    category_id: $(layero).find('#f-category-id').val() || null,
                    script_type: $(layero).find('#f-script-type').val(),
                    version: $('#f-version').val().trim(),
                    status: $(layero).find('#f-status').val(),
                    creator: $('#f-creator').val().trim(),
                    description: $('#f-description').val().trim(),
                    content: $('#f-content').val(),
                    remark: $('#f-remark').val().trim()
                };
                if (!payload.name) { layer.msg('请填写脚本名称', {icon: 2}); return; }

                var isEdit = !!payload.id;
                $.ajax({
                    url: '/script-repository/api/',
                    type: isEdit ? 'PUT' : 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    headers: {'X-CSRFToken': getCookie('csrftoken_dbatoolbox')},
                    success: function(r) {
                        if (r.code === 0) { layer.msg(r.msg, {icon: 1}); layer.close(index); location.reload(); }
                        else { layer.msg(r.msg, {icon: 2}); }
                    }
                });
            },
            btn2: function(index) { layer.close(index); }
        });
    }

    function getCookie(name) {
        var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
        return r ? r[1] : '';
    }
});
</script>
{% endblock %}
